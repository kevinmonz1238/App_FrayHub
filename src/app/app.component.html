<ion-app>

  <!-- MENÚ LATERAL -->
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>

      
      <ion-list>

        <ion-item routerLink="/inicio">
          <ion-icon name="home-outline" slot="start"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-item>

        <ion-item routerLink="/tareas">
          <ion-icon name="clipboard-outline" slot="start"></ion-icon>
          <ion-label>Tareas</ion-label>
        </ion-item>

        <ion-item routerLink="/comunidad">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Comunidad</ion-label>
        </ion-item>

        <ion-item routerLink="/materias">
          <ion-icon name="book-outline" slot="start"></ion-icon>
          <ion-label>Materias</ion-label>
        </ion-item>

        <ion-item routerLink="/aula">
          <ion-icon name="school-outline" slot="start"></ion-icon>
          <ion-label>Aula</ion-label>
        </ion-item>

      </ion-list>

      <!-- IMAGEN ABAJO -->
      <div class="menu-footer">
        <img src="../assets/img/logotipo_lisboa.png" alt="logo">
      </div>


    </ion-content>
  </ion-menu>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>

</ion-app>
