<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>COMUNIDAD</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Título -->
  <div class="header">
    <h1>Comunidad Escolar</h1>
    <p>Comparte ideas con tus compañeros</p>
  </div>

  <!-- Input para comentar -->
  <ion-card>
    <ion-item lines="none">
      <ion-input placeholder="Escribe un comentario..."></ion-input>
    </ion-item>
    <ion-button expand="block">
      Publicar
    </ion-button>
  </ion-card>

  <!-- Lista de comentarios -->
  <ion-card>
    <ion-card-content>
      <h2>Alumno</h2>
      <p>Este es un comentario de ejemplo.</p>
      <small>Hoy</small>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-content>
      <h2>Alumno</h2>
      <p>Otro comentario dentro de la comunidad.</p>
      <small>Ayer</small>
    </ion-card-content>
  </ion-card>

</ion-content>
