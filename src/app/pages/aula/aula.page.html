<ion-header class="ion-no-border">
  <ion-toolbar mode="ios" class="actividad-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button color="light"></ion-menu-button>
    </ion-buttons>
    <ion-title>Aulas</ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon slot="icon-only" name="school-outline" color="light"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding aula-content">

  <div class="main-header ion-padding-bottom">
    <h2>Gestión de Salones</h2>
    <p>Listado dinámico desde la base de datos.</p>
  </div>

  <div class="cards-container">
    
    <ion-card class="aula-card" *ngFor="let item of grupos">
      <div class="card-accent"></div>
      
      <ion-card-header>
        <div class="card-meta">
          <ion-badge color="warning">Grado: {{ item.grado }}°</ion-badge>
          <small class="timestamp">ID Plantel: {{ item.plantel_id }}</small>
        </div>
        <ion-card-title>{{ item.nombre }}</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-list lines="none">
          <ion-item class="aula-item">
            <ion-icon slot="start" name="easel-outline" color="primary"></ion-icon>
            <ion-label>
              <h3>Aula Asignada</h3>
              <p>{{ item.aula }}</p>
            </ion-label>
          </ion-item>
          
          <ion-item class="aula-item">
            <ion-icon slot="start" name="people-circle-outline" color="primary"></ion-icon>
            <ion-label>
              <h3>Capacidad Máxima</h3>
              <p>{{ item.capacidad_maxima }} personas</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
      
      <ion-footer class="ion-no-border card-footer">
        <ion-button fill="clear" color="secondary" size="small">
          <ion-icon slot="start" name="create-outline"></ion-icon>
          Editar Registro
        </ion-button>
      </ion-footer>
    </ion-card>

    <div *ngIf="grupos.length === 0" class="ion-text-center">
      <ion-spinner name="dots"></ion-spinner>
      <p>Esperando respuesta de la base de datos...</p>
    </div>

  </div>

</ion-content>
